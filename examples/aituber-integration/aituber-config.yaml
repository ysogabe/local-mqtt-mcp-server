# AITuberKit MQTT Integration Configuration

# MQTT Broker Settings
mqtt:
  brokers:
    - id: "primary"
      url: "mqtt://localhost:1883"
      clientId: "aituber-mcp-client"
      keepalive: 60
      clean: true
      reconnectPeriod: 1000
      # auth:
      #   username: "your_username"
      #   password: "your_password"
      # tls:
      #   enabled: true
      #   ca: "/path/to/ca.crt"
      #   cert: "/path/to/client.crt"
      #   key: "/path/to/client.key"

# Speech Integration Rules
speech:
  # Default voice settings
  defaults:
    voice: "friendly"
    speed: 1.0
    volume: 0.8
    
  # Topic-based speech rules
  rules:
    # Chat messages
    - pattern: "chat/messages/+"
      priority: "normal"
      voice: "friendly"
      template: "{{username}}さんからのメッセージ: {{text}}"
      conditions:
        - "text.length > 0"
        - "username != 'system'"
    
    # Critical alerts (highest priority)
    - pattern: "alerts/critical"
      priority: "interrupt"
      voice: "urgent"
      template: "緊急アラート: {{message}}"
      interrupt_current: true
    
    # Warning alerts
    - pattern: "alerts/warning"
      priority: "high"
      voice: "concerned"
      template: "警告: {{message}}"
    
    # Sensor data (conditional)
    - pattern: "sensors/+/temperature"
      priority: "low"
      voice: "informative"
      template: "{{location}}の温度が{{value}}度になりました"
      conditions:
        - "value > 30 || value < 5"  # Only speak extreme temperatures
    
    # System status
    - pattern: "status/system"
      priority: "low"
      voice: "neutral"
      template: "システムステータス: {{status}}"
      conditions:
        - "status == 'offline' || status == 'error'"

# Message Processing
processing:
  # Maximum messages per minute to avoid spam
  rate_limit: 60
  
  # Message queue settings
  queue:
    max_size: 100
    processing_interval: 100  # ms
  
  # Message filtering
  filters:
    # Block messages that are too long
    - type: "content"
      condition: "text.length > 200"
      action: "deny"
    
    # Allow only specific user roles
    - type: "source"
      condition: "role in ['user', 'moderator', 'admin']"
      action: "allow"
    
    # Rate limiting per user
    - type: "rate"
      condition: "messages_per_minute < 10"
      action: "allow"

# AITuberKit Integration
aituber:
  # Speech synthesis settings
  tts:
    engine: "voicevox"  # or "espeak", "festival", etc.
    voice_id: 1
    speed: 1.0
    pitch: 0.0
    intonation: 1.0
  
  # Emotion mapping
  emotions:
    "happy": 
      voice_id: 1
      pitch: 0.1
      speed: 1.1
    "sad":
      voice_id: 2
      pitch: -0.1
      speed: 0.9
    "excited":
      voice_id: 3
      pitch: 0.2
      speed: 1.2
    "calm":
      voice_id: 1
      pitch: 0.0
      speed: 0.95
    "urgent":
      voice_id: 4
      pitch: 0.15
      speed: 1.3

# Subscription Management
subscriptions:
  # Auto-subscribe to these topics on startup
  auto_subscribe:
    - topic: "chat/messages/+"
      qos: 1
    - topic: "alerts/#"
      qos: 2
    - topic: "status/system"
      qos: 1
    - topic: "sensors/+/temperature"
      qos: 0
    - topic: "sensors/+/humidity"
      qos: 0
  
  # Persistent subscriptions (survive reconnects)
  persistent: true

# Logging and Monitoring
logging:
  level: "info"  # debug, info, warn, error
  file: "/var/log/mqtt-aituber.log"
  max_size: "10MB"
  backup_count: 5

# Health Monitoring
health:
  check_interval: 30  # seconds
  endpoints:
    - "http://localhost:8080/health"  # AITuberKit health endpoint
  alerts:
    connection_down: true
    message_queue_full: true
    high_error_rate: true